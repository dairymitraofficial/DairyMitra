{% extends "base.html" %}

{% block content %}

<div class="section">

<h2 class="page-title">Vendor Special Milk Rate</h2>

<form method="POST" class="grid grid-cols-1 md:grid-cols-3 gap-4">

<div>
<label class="form-label">Vendor</label>

<select name="vendor_id" class="form-select" required>

{% for v in vendors %}

<option value="{{v.vendor_id}}">
{{v.vendor_id}} - {{v.name}}
</option>

{% endfor %}

</select>
</div>


<div>
<label class="form-label">Cow Rate</label>

<input
type="number"
step="0.01"
name="cow_rate"
class="form-input">
</div>


<div>
<label class="form-label">Buffalo Rate</label>

<input
type="number"
step="0.01"
name="buffalo_rate"
class="form-input">
</div>


<div>
<label class="form-label">Effective Date</label>

<input
type="date"
name="date"
class="form-input"
required>
</div>


<div>
<button type="submit" class="btn btn-primary w-full">
Save
</button>
</div>

</form>

</div>


<div class="section">

<div class="table-wrap">

<table class="table">

<thead>
<tr>
<th>Vendor</th>
<th>Cow Rate</th>
<th>Buffalo Rate</th>
<th>Date From</th>
</tr>
</thead>

<tbody>

{% for r in rates %}

<tr>

<td>{{r.name}}</td>

<td>{{r.cow_rate}}</td>

<td>{{r.buffalo_rate}}</td>

<td>{{r.date_from}}</td>

</tr>

{% endfor %}

</tbody>

</table>

</div>

</div>

{% endblock %}
