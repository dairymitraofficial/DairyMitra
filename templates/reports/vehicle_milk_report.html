{% extends "base.html" %}

{% block title %}Vehicle Milk Report{% endblock %}

{% block content %}

<h2 class="page-title">🚚 Vehicle Wise Milk Collection</h2>

<div class="section table-wrap">

<table class="table">

<thead>
<tr>
<th>Vehicle Number</th>
<th>Total Milk (L)</th>
</tr>
</thead>

<tbody>

{% for v in vehicles %}

<tr>
<td>{{ v.vehicle_number }}</td>
<td><strong>{{ "%.2f"|format(v.total_milk) }} L</strong></td>
</tr>

{% endfor %}

</tbody>

</table>

</div>

{% endblock %}
